{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg p-4">
            <div class="text-center mb-4">
                <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold">Cargar archivo de HRN</h3>
                <p class="text-muted">Asegúrate de que el archivo sea el formato .xlsx</p>
            </div>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-4">
                    <label class="form-label fw-bold">Mes de Revisión</label>
                    <select name="month" class="form-select form-select-lg">
                        <option>Enero</option><option>Febrero</option><option>Marzo</option>
                        <option>Abril</option><option>Mayo</option><option>Junio</option>
                        <option>Julio</option><option>Agosto</option><option>Septiembre</option>
                        <option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Documento Excel</label>
                    <input type="file" name="file" class="form-control form-control-lg" accept=".xlsx, .xls" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Subir</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-link text-muted">Cancelar y volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
