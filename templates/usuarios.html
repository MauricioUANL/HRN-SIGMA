{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Gestión de Usuarios</h2>
        <a href="{{ url_for('nuevo_usuario') }}" class="btn btn-primary">Crear Nuevo Usuario</a>
    </div>

    <div class="table-responsive bg-white p-3 shadow-sm rounded">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Nómina</th>
                    <th>Rol</th>
                    <th>Área</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for u in usuarios %}
                <tr>
                    <td>{{ u.full_name }}</td>
                    <td>{{ u.username }}</td>
                    <td><span class="badge bg-info text-dark">{{ u.role }}</span></td>
                    <td>{{ u.area }}</td>
                    <td>
                        <a href="{{ url_for('editar_usuario', id=u.id) }}" class="btn btn-sm btn-warning">Editar</a>
                        {% if u.username != 1 %}
                        <a href="{{ url_for('eliminar_usuario', id=u.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Borrar usuario?')">Eliminar</a>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
